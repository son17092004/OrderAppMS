syntax = "proto3";

package auth;

// ─────────────────────────────────────────────────────────────────────────────
// Auth gRPC Service — Internal authorizer used by API Gateway
// ─────────────────────────────────────────────────────────────────────────────
service AuthService {
  // Validate an access token (Keycloak OIDC or internal JWT) and return enriched user claims
  rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);

  // Fetch a user profile by internal user ID
  rpc GetUserProfile (GetUserProfileRequest) returns (UserProfileResponse);
}

// ─── Enums ───────────────────────────────────────────────────────────────────
enum TokenType {
  INTERNAL  = 0;
  KEYCLOAK  = 1;
}

// ─── Validate Token ──────────────────────────────────────────────────────────
message ValidateTokenRequest {
  string     token      = 1;
  TokenType  token_type = 2;
}

message ValidateTokenResponse {
  bool   valid         = 1;
  string user_id       = 2;
  string email         = 3;
  string role          = 4;
  string keycloak_id   = 5;
  bool   is_banned     = 6;
  string error_message = 7;
}

// ─── Get User Profile ────────────────────────────────────────────────────────
message GetUserProfileRequest {
  string user_id = 1;
}

message UserProfileResponse {
  string id          = 1;
  string email       = 2;
  string role        = 3;
  string keycloak_id = 4;
  bool   is_banned   = 5;
}
